# Inject VARSITY_API_KEY via the runtime environment before starting the runtime.
competition_id: 4
symbol: BTCUSDT
interval: 1m
# tick_interval_seconds derived from interval (60s for 1m)
kline_limit: 120
orderbook_depth: 20
max_iterations: 5
stop_when_competition_inactive: true
error_backoff_seconds: 5
dry_run: true
adapter_retry_attempts: 3
adapter_retry_backoff_seconds: 0.5
adapter_min_call_spacing_seconds: 0.0

# Optional signal bundle computed centrally by the framework.
# TA-Lib is used automatically when available; builtin indicators are used otherwise.
signal_indicators:
  - indicator: SMA
    params:
      period: 20
  - indicator: RSI
    params:
      period: 14
  - indicator: OBV
    params: {}

policy:
  # Which openclaw agent to use (defaults to "main" if unset)
  openclaw_agent_id: arena-trader
  # Default expression policy — setup agent will override with its own expressions
  type: expression
  params:
    entry_long: "rsi_14 < 35 and close > sma_20"
    entry_short: "rsi_14 > 65 and close < sma_20"
    exit: "rsi_14 > 55 or rsi_14 < 45"

risk_limits:
  max_position_size_pct: 1.0
  max_absolute_size: 0.01
  min_size: 0.001
  quantity_precision: 3
  price_precision: 2
  max_trades: 40
  min_seconds_between_trades: 60
  allow_long: true
  allow_short: true

storage:
  transition_path: ./artifacts/transitions.jsonl
  journal_path: ./artifacts/journal.jsonl
  max_in_memory_transitions: 1000
